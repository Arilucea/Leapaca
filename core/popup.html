<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <img src="icons/header_icon.png" alt="Logo" class="header-logo" />
        <h1 data-i18n="appNameStyled">Leapaca NX</h1>
      </header>

      <div class="content-row">
        <aside class="sidebar">
          <div class="sidebar-top">
            <button
              id="playButton"
              class="icon-button sidebar-btn active"
              aria-label="Play"
              title="Main"
            >
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="currentColor"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>
            <!-- app-sidebar-top-buttons -->
          </div>
          <div class="sidebar-bottom">
            <button
              id="openSettings"
              class="icon-button sidebar-btn"
              aria-label="Settings"
              title="Settings"
            >
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="currentColor"
              >
                <path
                  d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.68 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.48.48 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                />
              </svg>
            </button>
          </div>
        </aside>

        <div class="content-wrapper">
          <main id="mainView">
            <label for="speed" class="speed-label">
              <span data-i18n="speedLabel"></span>
              <div class="speed-input-wrapper">
                <span id="speedDisplay" class="speed-display">1×</span>
              </div>
            </label>
            <input
              type="range"
              min="0"
              max="2.5"
              step="0.05"
              id="speed"
              class="range-input"
            />
            <div class="speed-marks">
              <span class="mark">0</span>
              <span class="mark"></span>
              <span class="mark"></span>
              <span class="mark"></span>
              <span class="mark">1</span>
              <span class="mark"></span>
              <span class="mark"></span>
              <span class="mark"></span>
              <span class="mark">2</span>
              <span class="mark"></span>
              <span class="mark">2.5</span>
            </div>

            <div class="toggles">
              <label class="toggle">
                <input type="checkbox" id="skipIntro" />
                <span class="toggle-slider"></span>
                <span class="toggle-label" data-i18n="skipIntroLabel"></span>
              </label>

              <!-- app-main-toggles -->

              <label class="toggle">
                <input type="checkbox" id="skipPreplay" />
                <span class="toggle-slider"></span>
                <span class="toggle-label" data-i18n="skipPreplayLabel"></span>
              </label>
            </div>
          </main>

          <div id="settingsPanel" class="settings-panel">
            <div class="settings-header">
              <h2 data-i18n="optionsTitle"></h2>
            </div>

            <div class="settings-content">
              <label for="theme" class="speed-label">
                <span data-i18n="themeLabel"></span>
              </label>
              <div class="select-wrapper" style="margin-bottom: 20px">
                <select id="theme" class="language-select">
                  <option value="auto" data-i18n="autoTheme">Auto</option>
                  <option value="light" data-i18n="lightTheme">Light</option>
                  <option value="dark" data-i18n="darkTheme">Dark</option>
                </select>
              </div>

              <label for="language" class="speed-label">
                <span data-i18n="languageLabel"></span>
              </label>
              <div class="select-wrapper" style="margin-bottom: 20px">
                <select id="language" class="language-select">
                  <option value="en" data-i18n="englishLanguage">
                    English
                  </option>
                  <option value="es" data-i18n="spanishLanguage">
                    Español
                  </option>
                </select>
              </div>

              <div class="toggles">
                <label class="toggle">
                  <input type="checkbox" id="lockSpeed" />
                  <span class="toggle-slider"></span>
                  <span class="toggle-label" data-i18n="lockSpeedLabel"></span>
                </label>
                <!-- app-settings-toggles -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
